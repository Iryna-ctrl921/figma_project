<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Макет сторінки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sekuya&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="collection-section">
        <div class="container">
            
            <div class="content-block">
                <h1 class="main-title">New Collection<br>Summer 2024</h1>
                <p class="description">
                    Discover the latest trends in fashion with our curated<br>
                    collection of premium apparel. Quality meets style in<br>
                    every piece.
                </p>
                
                <div class="button-group">
                    <button class="btn btn-dark">Shop Now</button>
                    <button class="btn btn-light">View Catalog</button>
                </div>
                
                <div class="features-group">
                    <div class="feature-item">
                        <span class="icon dot-green"></span>
                        <span class="feature-text">Free Shipping</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon dot-blue"></span>
                        <span class="feature-text">30-Day Returns</span>
                    </div>
                </div>
            </div>

            <div class="image-gallery-grid">
                <div class="main-image-wrapper">
                    <img src="images/shop.jpg">
                    <span class="badge badge-new">New</span>
                    <span class="badge badge-discount">50% Off</span>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
